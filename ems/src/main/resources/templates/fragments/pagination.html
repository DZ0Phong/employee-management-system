<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<!--
  Reusable Pagination Fragment
  Usage: th:replace="~{fragments/pagination :: pagination(pageData=${yourPage}, baseUrl='/your/base-url')}"
  - pageData: a Spring Data Page<?> object
  - baseUrl: the URL path (without ?page=)
-->
<div th:fragment="pagination(pageData, baseUrl)"
     th:if="${pageData.totalPages > 1}"
     class="flex flex-col sm:flex-row items-center justify-between gap-3 pt-4 anim anim-3">

    <!-- Left: Showing X to Y of Z results -->
    <p class="text-xs text-slate-400 font-medium">
        Showing
        <span class="font-semibold text-slate-600"
              th:text="${pageData.number * pageData.size + 1}">1</span>
        to
        <span class="font-semibold text-slate-600"
              th:text="${pageData.number * pageData.size + pageData.numberOfElements}">10</span>
        of
        <span class="font-semibold text-slate-600"
              th:text="${pageData.totalElements}">100</span>
        results
    </p>

    <!-- Right: Page controls -->
    <div class="flex items-center gap-1.5">

        <!-- Previous button -->
        <a th:if="${pageData.number > 0}"
           th:href="@{${baseUrl}(page=${pageData.number - 1})}"
           class="inline-flex items-center gap-1 px-3 py-1.5 text-xs font-semibold text-slate-600 bg-white border border-slate-200 rounded-lg hover:bg-slate-50 hover:border-slate-300 transition-all shadow-sm">
            <span class="material-symbols-outlined text-[14px]">chevron_left</span>
            Prev
        </a>
        <span th:if="${pageData.number == 0}"
              class="inline-flex items-center gap-1 px-3 py-1.5 text-xs font-semibold text-slate-300 bg-slate-50 border border-slate-100 rounded-lg cursor-not-allowed">
            <span class="material-symbols-outlined text-[14px]">chevron_left</span>
            Prev
        </span>

        <!-- Page numbers with ellipsis logic -->
        <th:block th:with="totalPages=${pageData.totalPages}, currentPage=${pageData.number}">

            <!-- Case 1: totalPages <= 7 → show all pages -->
            <th:block th:if="${totalPages <= 7}">
                <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
                    <a th:if="${i != currentPage}"
                       th:href="@{${baseUrl}(page=${i})}"
                       th:text="${i + 1}"
                       class="w-8 h-8 flex items-center justify-center text-xs font-semibold text-slate-500 bg-white border border-slate-200 rounded-lg hover:bg-slate-50 hover:border-slate-300 transition-all shadow-sm">1</a>
                    <span th:if="${i == currentPage}"
                          th:text="${i + 1}"
                          class="w-8 h-8 flex items-center justify-center text-xs font-bold text-white bg-blue-600 rounded-lg shadow-sm shadow-blue-600/30">1</span>
                </th:block>
            </th:block>

            <!-- Case 2: totalPages > 7 → show with ellipsis -->
            <th:block th:if="${totalPages > 7}">

                <!-- Always show page 1 -->
                <a th:if="${currentPage != 0}"
                   th:href="@{${baseUrl}(page=0)}"
                   class="w-8 h-8 flex items-center justify-center text-xs font-semibold text-slate-500 bg-white border border-slate-200 rounded-lg hover:bg-slate-50 hover:border-slate-300 transition-all shadow-sm">1</a>
                <span th:if="${currentPage == 0}"
                      class="w-8 h-8 flex items-center justify-center text-xs font-bold text-white bg-blue-600 rounded-lg shadow-sm shadow-blue-600/30">1</span>

                <!-- Left ellipsis -->
                <span th:if="${currentPage > 3}"
                      class="w-8 h-8 flex items-center justify-center text-xs text-slate-400 font-bold">…</span>

                <!-- Middle pages: show range around current -->
                <th:block th:with="
                    rangeStart=${currentPage <= 3 ? 1 : (currentPage >= totalPages - 4 ? totalPages - 5 : currentPage - 1)},
                    rangeEnd=${currentPage <= 3 ? 4 : (currentPage >= totalPages - 4 ? totalPages - 2 : currentPage + 1)}">
                    <th:block th:each="i : ${#numbers.sequence(rangeStart, rangeEnd)}">
                        <a th:if="${i != currentPage}"
                           th:href="@{${baseUrl}(page=${i})}"
                           th:text="${i + 1}"
                           class="w-8 h-8 flex items-center justify-center text-xs font-semibold text-slate-500 bg-white border border-slate-200 rounded-lg hover:bg-slate-50 hover:border-slate-300 transition-all shadow-sm">2</a>
                        <span th:if="${i == currentPage}"
                              th:text="${i + 1}"
                              class="w-8 h-8 flex items-center justify-center text-xs font-bold text-white bg-blue-600 rounded-lg shadow-sm shadow-blue-600/30">2</span>
                    </th:block>
                </th:block>

                <!-- Right ellipsis -->
                <span th:if="${currentPage < totalPages - 4}"
                      class="w-8 h-8 flex items-center justify-center text-xs text-slate-400 font-bold">…</span>

                <!-- Always show last page -->
                <a th:if="${currentPage != totalPages - 1}"
                   th:href="@{${baseUrl}(page=${totalPages - 1})}"
                   th:text="${totalPages}"
                   class="w-8 h-8 flex items-center justify-center text-xs font-semibold text-slate-500 bg-white border border-slate-200 rounded-lg hover:bg-slate-50 hover:border-slate-300 transition-all shadow-sm">10</a>
                <span th:if="${currentPage == totalPages - 1}"
                      th:text="${totalPages}"
                      class="w-8 h-8 flex items-center justify-center text-xs font-bold text-white bg-blue-600 rounded-lg shadow-sm shadow-blue-600/30">10</span>
            </th:block>

        </th:block>

        <!-- Next button -->
        <a th:if="${pageData.number < pageData.totalPages - 1}"
           th:href="@{${baseUrl}(page=${pageData.number + 1})}"
           class="inline-flex items-center gap-1 px-3 py-1.5 text-xs font-semibold text-slate-600 bg-white border border-slate-200 rounded-lg hover:bg-slate-50 hover:border-slate-300 transition-all shadow-sm">
            Next
            <span class="material-symbols-outlined text-[14px]">chevron_right</span>
        </a>
        <span th:if="${pageData.number >= pageData.totalPages - 1}"
              class="inline-flex items-center gap-1 px-3 py-1.5 text-xs font-semibold text-slate-300 bg-slate-50 border border-slate-100 rounded-lg cursor-not-allowed">
            Next
            <span class="material-symbols-outlined text-[14px]">chevron_right</span>
        </span>
    </div>
</div>
</html>
