<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

<aside th:fragment="sidebar(activeMenu, employee, managementPortalUrl, managementPortalLabel)"
       class="w-64 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col fixed h-full">
    <div class="p-6 flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-white">
            <span class="material-symbols-outlined">corporate_fare</span>
        </div>
        <div>
            <h1 class="text-slate-900 dark:text-white font-bold text-lg leading-tight">HRM Pro</h1>
            <p class="text-slate-500 dark:text-slate-400 text-xs">Employee Portal</p>
        </div>
    </div>

    <nav class="flex-1 px-4 space-y-1">
        <a th:href="@{/employee/dashboard}"
           th:class="${activeMenu == 'dashboard'} ? 'flex items-center gap-3 px-3 py-2.5 rounded-lg bg-primary text-white' : 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors'">
            <span class="material-symbols-outlined">dashboard</span>
            <span class="text-sm font-medium">Dashboard</span>
        </a>
        <a th:href="@{/employee/profile}"
           th:class="${activeMenu == 'profile'} ? 'flex items-center gap-3 px-3 py-2.5 rounded-lg bg-primary text-white' : 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors'">
            <span class="material-symbols-outlined">person</span>
            <span class="text-sm font-medium">My Profile</span>
        </a>
        <a th:href="@{/employee/attendance}"
           th:class="${activeMenu == 'attendance'} ? 'flex items-center gap-3 px-3 py-2.5 rounded-lg bg-primary text-white' : 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors'">
            <span class="material-symbols-outlined">schedule</span>
            <span class="text-sm font-medium">My Attendance</span>
        </a>
        <a th:href="@{/employee/leave}"
           th:class="${activeMenu == 'leave'} ? 'flex items-center gap-3 px-3 py-2.5 rounded-lg bg-primary text-white' : 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors'">
            <span class="material-symbols-outlined">calendar_today</span>
            <span class="text-sm font-medium">My Leave</span>
        </a>
        <a th:href="@{/employee/payroll}"
           th:class="${activeMenu == 'payroll'} ? 'flex items-center gap-3 px-3 py-2.5 rounded-lg bg-primary text-white' : 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors'">
            <span class="material-symbols-outlined">payments</span>
            <span class="text-sm font-medium">My Payroll</span>
        </a>
        <a th:href="@{/employee/performance}"
           th:class="${activeMenu == 'performance'} ? 'flex items-center gap-3 px-3 py-2.5 rounded-lg bg-primary text-white' : 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors'">
            <span class="material-symbols-outlined">trending_up</span>
            <span class="text-sm font-medium">My Performance</span>
        </a>
    </nav>

    <div th:if="${managementPortalUrl != null}" class="px-4 pb-2">
        <a th:href="${managementPortalUrl}"
           class="flex items-center justify-between rounded-xl border border-primary/15 bg-primary/5 px-3 py-3 text-primary transition-colors hover:bg-primary/10">
            <div>
                <p class="text-[10px] font-bold uppercase tracking-[0.18em] text-primary/60">Portal Switch</p>
                <p class="text-sm font-semibold" th:text="${managementPortalLabel}">Management View</p>
            </div>
            <span class="material-symbols-outlined text-[18px]">badge</span>
        </a>
    </div>

    <div class="p-4 border-t border-slate-200 dark:border-slate-800">
        <div class="flex items-center gap-3 px-2">
            <div class="w-8 h-8 rounded-full bg-slate-200 dark:bg-slate-700 flex items-center justify-center"
                 th:if="${employee.avatarUrl == null}">
                <span class="material-symbols-outlined text-slate-600 dark:text-slate-300 text-sm">person</span>
            </div>
            <div class="w-8 h-8 rounded-full bg-slate-200 dark:bg-slate-700 bg-cover bg-center"
                 th:if="${employee.avatarUrl != null}"
                 th:style="'background-image: url(' + ${employee.avatarUrl} + ')'"></div>
            <div class="flex-1 overflow-hidden">
                <p class="text-sm font-medium truncate" th:text="${employee.fullName}">Employee</p>
                <p class="text-xs text-slate-500 truncate" th:text="${employee.position}">Staff</p>
            </div>
            <form th:action="@{/logout}" method="post" class="shrink-0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit"
                        class="w-7 h-7 rounded-lg flex items-center justify-center text-slate-400 hover:text-rose-500 hover:bg-rose-50 transition-colors">
                    <span class="material-symbols-outlined text-sm">logout</span>
                </button>
            </form>
        </div>
    </div>
</aside>

</body>
</html>
