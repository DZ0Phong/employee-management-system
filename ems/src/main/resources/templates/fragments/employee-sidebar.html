<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

<aside th:fragment="sidebar(activeMenu, employee, managementPortalUrl, managementPortalLabel, managementRoleLabel)"
       class="w-[280px] bg-white border-r border-slate-100 flex flex-col shrink-0 fixed h-full relative overflow-hidden">
    <div class="absolute top-0 right-0 w-40 h-40 bg-primary/5 rounded-full -translate-y-1/2 translate-x-1/2 pointer-events-none"></div>

    <div class="px-6 py-6 flex items-center gap-3 relative z-10 shrink-0">
        <div class="w-10 h-10 rounded-xl bg-primary flex items-center justify-center text-white shadow-md shadow-primary/30">
            <span class="material-symbols-outlined text-[22px]">corporate_fare</span>
        </div>
        <div>
            <h1 class="text-base font-black tracking-tight text-slate-900">EMS Pro</h1>
            <p class="text-[11px] text-slate-400 font-medium whitespace-nowrap">Employee Portal</p>
        </div>
    </div>

    <div class="flex-1 overflow-y-auto px-4 py-2 space-y-8 scrollbar-hide">
        <div>
            <p class="px-3 text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Main</p>
            <nav class="space-y-1">
                <a th:href="@{/employee/dashboard}"
                   th:class="${activeMenu == 'dashboard'} ? 'nav-active flex items-center gap-3 px-3 py-2 rounded-xl bg-primary-light text-primary transition-colors' : 'group flex items-center gap-3 px-3 py-2.5 text-slate-500 hover:bg-slate-50 rounded-xl transition-all'">
                    <span class="material-symbols-outlined text-[20px]"
                          th:classappend="${activeMenu == 'dashboard'} ? ' fill-icon' : ' group-hover:text-primary transition-all'">dashboard</span>
                    <span class="text-sm" th:classappend="${activeMenu == 'dashboard'} ? ' font-semibold' : ' font-medium'">Dashboard</span>
                </a>

                <a th:href="@{/employee/profile}"
                   th:class="${activeMenu == 'profile'} ? 'nav-active flex items-center gap-3 px-3 py-2 rounded-xl bg-primary-light text-primary transition-colors' : 'group flex items-center gap-3 px-3 py-2.5 text-slate-500 hover:bg-slate-50 rounded-xl transition-all'">
                    <span class="material-symbols-outlined text-[20px]"
                          th:classappend="${activeMenu == 'profile'} ? ' fill-icon' : ' group-hover:text-primary transition-all'">person</span>
                    <span class="text-sm" th:classappend="${activeMenu == 'profile'} ? ' font-semibold' : ' font-medium'">My Profile</span>
                </a>

                <a th:href="@{/employee/attendance}"
                   th:class="${activeMenu == 'attendance'} ? 'nav-active flex items-center gap-3 px-3 py-2 rounded-xl bg-primary-light text-primary transition-colors' : 'group flex items-center gap-3 px-3 py-2.5 text-slate-500 hover:bg-slate-50 rounded-xl transition-all'">
                    <span class="material-symbols-outlined text-[20px]"
                          th:classappend="${activeMenu == 'attendance'} ? ' fill-icon' : ' group-hover:text-primary transition-all'">schedule</span>
                    <span class="text-sm" th:classappend="${activeMenu == 'attendance'} ? ' font-semibold' : ' font-medium'">My Attendance</span>
                </a>

                <a th:href="@{/employee/leave}"
                   th:class="${activeMenu == 'leave'} ? 'nav-active flex items-center gap-3 px-3 py-2 rounded-xl bg-primary-light text-primary transition-colors' : 'group flex items-center gap-3 px-3 py-2.5 text-slate-500 hover:bg-slate-50 rounded-xl transition-all'">
                    <span class="material-symbols-outlined text-[20px]"
                          th:classappend="${activeMenu == 'leave'} ? ' fill-icon' : ' group-hover:text-primary transition-all'">calendar_today</span>
                    <span class="text-sm" th:classappend="${activeMenu == 'leave'} ? ' font-semibold' : ' font-medium'">My Leave</span>
                </a>

                <a th:href="@{/employee/payroll}"
                   th:class="${activeMenu == 'payroll'} ? 'nav-active flex items-center gap-3 px-3 py-2 rounded-xl bg-primary-light text-primary transition-colors' : 'group flex items-center gap-3 px-3 py-2.5 text-slate-500 hover:bg-slate-50 rounded-xl transition-all'">
                    <span class="material-symbols-outlined text-[20px]"
                          th:classappend="${activeMenu == 'payroll'} ? ' fill-icon' : ' group-hover:text-primary transition-all'">payments</span>
                    <span class="text-sm" th:classappend="${activeMenu == 'payroll'} ? ' font-semibold' : ' font-medium'">My Payroll</span>
                </a>

                <a th:href="@{/employee/performance}"
                   th:class="${activeMenu == 'performance'} ? 'nav-active flex items-center gap-3 px-3 py-2 rounded-xl bg-primary-light text-primary transition-colors' : 'group flex items-center gap-3 px-3 py-2.5 text-slate-500 hover:bg-slate-50 rounded-xl transition-all'">
                    <span class="material-symbols-outlined text-[20px]"
                          th:classappend="${activeMenu == 'performance'} ? ' fill-icon' : ' group-hover:text-primary transition-all'">trending_up</span>
                    <span class="text-sm" th:classappend="${activeMenu == 'performance'} ? ' font-semibold' : ' font-medium'">My Performance</span>
                </a>
            </nav>
        </div>
    </div>

    <div class="p-4 shrink-0">
        <a th:if="${managementPortalUrl != null}"
           th:href="${managementPortalUrl}"
           class="mb-3 flex items-center justify-between rounded-2xl border border-primary/15 bg-primary/5 px-4 py-3 text-primary transition-colors hover:bg-primary/10">
            <div>
                <p class="text-[10px] font-bold uppercase tracking-[0.18em] text-primary/60">Portal Switch</p>
                <p class="text-sm font-semibold" th:text="${managementPortalLabel}">Management View</p>
            </div>
            <span class="material-symbols-outlined text-[18px]">badge</span>
        </a>

        <div class="bg-slate-50 border border-slate-100 rounded-2xl p-3 flex items-center gap-3">
            <div class="w-9 h-9 rounded-full overflow-hidden bg-primary/10 flex items-center justify-center text-primary font-bold text-sm shrink-0">
                <img th:if="${employee != null && employee.avatarUrl != null}"
                     th:src="${employee.avatarUrl}"
                     th:alt="${employee.fullName}"
                     class="w-full h-full object-cover"
                     onerror="this.style.display='none'"/>
                <span th:if="${employee == null || employee.avatarUrl == null}"
                      class="material-symbols-outlined text-[18px]">person</span>
            </div>
            <div class="flex-1 min-w-0">
                <p class="text-xs font-bold text-slate-800 truncate" th:text="${employee != null ? employee.fullName : 'Employee'}">Employee</p>
                <p class="text-[11px] font-medium text-slate-400 truncate"
                   th:text="${managementRoleLabel != null ? managementRoleLabel : (employee != null ? employee.position : '')}">Staff</p>
            </div>
            <form th:action="@{/logout}" method="post" class="shrink-0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit"
                        class="w-7 h-7 rounded-lg flex items-center justify-center text-slate-400 hover:text-rose-500 hover:bg-rose-50 transition-colors">
                    <span class="material-symbols-outlined text-sm">logout</span>
                </button>
            </form>
        </div>
    </div>
</aside>

</body>
</html>
