<!-- fragments/admin-sidebar.html -->
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

<aside th:fragment="sidebar(activePage)"
       class="w-72 bg-white border-r border-slate-100 flex flex-col shrink-0 relative overflow-hidden">

    <div class="absolute top-0 right-0 w-40 h-40 bg-primary/5 rounded-full -translate-y-1/2 translate-x-1/2 pointer-events-none"></div>

    <!-- Brand -->
    <div class="px-6 py-6 flex items-center gap-3 relative z-10">
        <div class="w-10 h-10 rounded-xl bg-primary flex items-center justify-center text-white shadow-md shadow-primary/30">
            <span class="material-symbols-outlined text-[22px]">corporate_fare</span>
        </div>
        <div>
            <h1 class="text-base font-black tracking-tight">EMS Pro</h1>
            <p class="text-[11px] text-slate-400 font-medium">Workspace Management</p>
        </div>
    </div>

    <!-- Nav -->
    <nav class="flex-1 px-3 space-y-0.5 overflow-y-auto">
        <p class="px-3 pb-1 pt-1 text-[10px] font-bold text-slate-300 uppercase tracking-widest">Main</p>

        <a th:href="@{/admin/dashboard}"
           th:classappend="${activePage == 'dashboard'} ? 'nav-active bg-primary-light text-primary' : 'text-slate-500 hover:bg-slate-50'"
           class="flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all group">
            <span th:classappend="${activePage == 'dashboard'} ? 'fill-icon text-primary' : 'text-slate-400 group-hover:text-primary'"
                  class="material-symbols-outlined text-[20px] transition-colors">dashboard</span>
            <span th:classappend="${activePage == 'dashboard'} ? 'font-semibold' : 'font-medium'"
                  class="text-sm">Dashboard</span>
        </a>

        <a th:href="@{/admin/company-info}"
           th:classappend="${activePage == 'company' or activePage == 'company-info'} ? 'nav-active bg-primary-light text-primary' : 'text-slate-500 hover:bg-slate-50'"
           class="flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all group">
            <span th:classappend="${activePage == 'company' or activePage == 'company-info'} ? 'fill-icon text-primary' : 'text-slate-400 group-hover:text-primary'"
                  class="material-symbols-outlined text-[20px] transition-colors">domain</span>
            <span th:classappend="${activePage == 'company' or activePage == 'company-info'} ? 'font-semibold' : 'font-medium'"
                  class="text-sm">Company</span>
        </a>

        <a th:href="@{/admin/departments}"
           th:classappend="${activePage == 'departments'} ? 'nav-active bg-primary-light text-primary' : 'text-slate-500 hover:bg-slate-50'"
           class="flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all group">
            <span th:classappend="${activePage == 'departments'} ? 'fill-icon text-primary' : 'text-slate-400 group-hover:text-primary'"
                  class="material-symbols-outlined text-[20px] transition-colors">account_tree</span>
            <span th:classappend="${activePage == 'departments'} ? 'font-semibold' : 'font-medium'"
                  class="text-sm">Departments</span>
            <span class="ml-auto text-[10px] font-bold bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded-md"
                  th:text="${statTotal ?: 0}">0</span>
        </a>

        <a th:href="@{/admin/roles}"
           th:classappend="${activePage == 'roles'} ? 'nav-active bg-primary-light text-primary' : 'text-slate-500 hover:bg-slate-50'"
           class="flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all group">
            <span th:classappend="${activePage == 'roles'} ? 'fill-icon text-primary' : 'text-slate-400 group-hover:text-primary'"
                  class="material-symbols-outlined text-[20px] transition-colors">admin_panel_settings</span>
            <span th:classappend="${activePage == 'roles'} ? 'font-semibold' : 'font-medium'"
                  class="text-sm">Roles &amp; Permissions</span>
        </a>

        <a th:href="@{/admin/users}"
           th:classappend="${activePage == 'users'} ? 'nav-active bg-primary-light text-primary' : 'text-slate-500 hover:bg-slate-50'"
           class="flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all group">
            <span th:classappend="${activePage == 'users'} ? 'fill-icon text-primary' : 'text-slate-400 group-hover:text-primary'"
                  class="material-symbols-outlined text-[20px] transition-colors">group</span>
            <span th:classappend="${activePage == 'users'} ? 'font-semibold' : 'font-medium'"
                  class="text-sm">User Accounts</span>
            <span class="ml-auto w-2 h-2 rounded-full bg-emerald-400 pulse-dot"></span>
        </a>

        <p class="px-3 pb-1 pt-4 text-[10px] font-bold text-slate-300 uppercase tracking-widest">System</p>

        <a th:href="@{/admin/system-log}"
           th:classappend="${activePage == 'system-log'} ? 'nav-active bg-primary-light text-primary' : 'text-slate-500 hover:bg-slate-50'"
           class="flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all group">
            <span th:classappend="${activePage == 'system-log'} ? 'fill-icon text-primary' : 'text-slate-400 group-hover:text-primary'"
                  class="material-symbols-outlined text-[20px] transition-colors">receipt_long</span>
            <span th:classappend="${activePage == 'system-log'} ? 'font-semibold' : 'font-medium'"
                  class="text-sm">System Logs</span>
        </a>


        <a th:href="@{/admin/settings}"
           th:classappend="${activePage == 'settings'} ? 'nav-active bg-primary-light text-primary' : 'text-slate-500 hover:bg-slate-50'"
           class="flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all group">
            <span th:classappend="${activePage == 'settings'} ? 'fill-icon text-primary' : 'text-slate-400 group-hover:text-primary'"
                  class="material-symbols-outlined text-[20px] transition-colors">settings</span>
            <span th:classappend="${activePage == 'settings'} ? 'font-semibold' : 'font-medium'"
                  class="text-sm">Settings</span>
        </a>
    </nav>

    <!-- User profile -->
    <div class="p-4">
        <div class="bg-slate-50 border border-slate-100 rounded-2xl p-3 flex items-center gap-3">
            <div class="w-9 h-9 rounded-full overflow-hidden bg-primary/10 flex items-center justify-center text-primary font-bold text-sm shrink-0">
                <img th:if="${currentUser != null and currentUser.avatarUrl != null}"
                     th:src="${currentUser.avatarUrl}" th:alt="${currentUser.fullName}"
                     class="w-full h-full object-cover" onerror="this.style.display='none'"/>
                <span th:unless="${currentUser != null and currentUser.avatarUrl != null}"
                      th:text="${currentUser != null ? currentUser.getInitials() : 'AD'}">AD</span>
            </div>
            <div class="flex-1 min-w-0">
                <p class="text-xs font-bold text-slate-800 truncate" th:text="${currentUser?.fullName ?: 'Admin'}">Admin</p>
                <p class="text-[11px] text-slate-400 truncate" th:text="${currentUser?.email ?: ''}"></p>
            </div>
            <form th:action="@{/logout}" method="post" class="shrink-0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit"
                        class="w-7 h-7 rounded-lg flex items-center justify-center text-slate-400 hover:text-rose-500 hover:bg-rose-50 transition-colors"
                        title="Log out">
                    <span class="material-symbols-outlined text-sm">logout</span>
                </button>
            </form>
        </div>
    </div>

</aside>

</body>
</html>
