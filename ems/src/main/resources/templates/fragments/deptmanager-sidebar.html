<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

<aside th:fragment="sidebar(activeMenu, data)" class="w-[280px] bg-white border-r border-slate-100 flex flex-col shrink-0 relative overflow-hidden">
    <div class="absolute top-0 right-0 w-40 h-40 bg-primary/5 rounded-full -translate-y-1/2 translate-x-1/2 pointer-events-none"></div>

    <div class="px-6 py-6 flex items-center gap-3 relative z-10 shrink-0">
        <div class="w-10 h-10 rounded-xl bg-primary flex items-center justify-center text-white shadow-md shadow-primary/30">
            <span class="material-symbols-outlined text-[22px]">corporate_fare</span>
        </div>
        <div>
            <h1 class="text-base font-black tracking-tight text-slate-900">EMS Pro</h1>
            <p class="text-[11px] text-slate-400 font-medium whitespace-nowrap">Department Management</p>
        </div>
    </div>

    <div class="flex-1 overflow-y-auto px-4 py-2 space-y-8 scrollbar-hide">
        <div>
            <p class="px-3 text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Main</p>
            <nav class="space-y-1">
                <a th:href="@{/dept-manager/dashboard}"
                   th:class="${activeMenu == 'dashboard'} ? 'nav-active flex items-center px-3 py-2 rounded-xl bg-primary-light text-primary transition-colors' : 'group flex items-center gap-3 px-3 py-2.5 text-slate-500 hover:bg-slate-50 rounded-xl transition-all'">
                    <div class="flex items-center gap-3">
                        <span class="material-symbols-outlined text-[20px]"
                              th:classappend="${activeMenu == 'dashboard'} ? ' fill-icon' : ' group-hover:text-primary transition-all'">dashboard</span>
                        <span class="text-sm" th:classappend="${activeMenu == 'dashboard'} ? ' font-semibold' : ' font-medium'">Dashboard</span>
                    </div>
                </a>

                <a th:href="@{/dept-manager/my-department}"
                   th:class="${activeMenu == 'department'} ? 'nav-active flex items-center px-3 py-2 rounded-xl bg-primary-light text-primary transition-colors' : 'group flex items-center gap-3 px-3 py-2.5 text-slate-500 hover:bg-slate-50 rounded-xl transition-all'">
                    <span class="material-symbols-outlined text-[20px]"
                          th:classappend="${activeMenu == 'department'} ? ' fill-icon' : ' group-hover:text-primary transition-all'">domain</span>
                    <span class="text-sm" th:classappend="${activeMenu == 'department'} ? ' font-semibold' : ' font-medium'">My Department</span>
                </a>

                <a th:href="@{/dept-manager/my-team}"
                   th:class="${activeMenu == 'team'} ? 'nav-active flex items-center px-3 py-2 rounded-xl bg-primary-light text-primary transition-colors' : 'group flex items-center gap-3 px-3 py-2.5 text-slate-500 hover:bg-slate-50 rounded-xl transition-all'">
                    <span class="material-symbols-outlined text-[20px]"
                          th:classappend="${activeMenu == 'team'} ? ' fill-icon' : ' group-hover:text-primary transition-all'">groups</span>
                    <span class="text-sm" th:classappend="${activeMenu == 'team'} ? ' font-semibold' : ' font-medium'">Team Members</span>
                </a>

                <a th:href="@{/dept-manager/leave-approval}"
                   th:class="${activeMenu == 'leave'} ? 'nav-active flex items-center justify-between px-3 py-2 rounded-xl bg-primary-light text-primary transition-colors' : 'group flex items-center justify-between px-3 py-2.5 text-slate-500 hover:bg-slate-50 rounded-xl transition-all'">
                    <div class="flex items-center gap-3">
                        <span class="material-symbols-outlined text-[20px]"
                              th:classappend="${activeMenu == 'leave'} ? ' fill-icon' : ' group-hover:text-primary transition-all'">event_available</span>
                        <span class="text-sm" th:classappend="${activeMenu == 'leave'} ? ' font-semibold' : ' font-medium'">Leave Approval</span>
                    </div>
                    <span class="bg-amber-100 text-amber-600 text-[10px] font-bold px-2 py-0.5 rounded-full"
                          th:text="${data.pendingApprovals}">0</span>
                </a>

                <a th:href="@{/dept-manager/attendance-review}"
                   th:class="${activeMenu == 'attendance'} ? 'nav-active flex items-center px-3 py-2 rounded-xl bg-primary-light text-primary transition-colors' : 'group flex items-center gap-3 px-3 py-2.5 text-slate-500 hover:bg-slate-50 rounded-xl transition-all'">
                    <span class="material-symbols-outlined text-[20px]"
                          th:classappend="${activeMenu == 'attendance'} ? ' fill-icon' : ' group-hover:text-primary transition-all'">fact_check</span>
                    <span class="text-sm" th:classappend="${activeMenu == 'attendance'} ? ' font-semibold' : ' font-medium'">Attendance Review</span>
                </a>

                <a th:href="@{/dept-manager/performance-review}"
                   th:class="${activeMenu == 'performance'} ? 'nav-active flex items-center px-3 py-2 rounded-xl bg-primary-light text-primary transition-colors' : 'group flex items-center gap-3 px-3 py-2.5 text-slate-500 hover:bg-slate-50 rounded-xl transition-all'">
                    <span class="material-symbols-outlined text-[20px]"
                          th:classappend="${activeMenu == 'performance'} ? ' fill-icon' : ' group-hover:text-primary transition-all'">rate_review</span>
                    <span class="text-sm" th:classappend="${activeMenu == 'performance'} ? ' font-semibold' : ' font-medium'">Performance Review</span>
                </a>
            </nav>
        </div>

        <div th:if="${activeMenu == 'performance'}" class="px-2">
            <button id="new-review-btn" type="button"
                    class="w-full flex items-center justify-center gap-2 bg-primary text-white py-2.5 rounded-xl text-sm font-bold shadow-sm shadow-primary/20 hover:bg-primary/90 transition-all">
                <span class="material-symbols-outlined text-[18px]">add</span>
                <span>New Review</span>
            </button>
        </div>
    </div>

    <div class="p-4 shrink-0">
        <a th:href="@{/employee/dashboard}"
           class="mb-3 flex items-center justify-between rounded-2xl border border-primary/15 bg-primary/5 px-4 py-3 text-primary transition-colors hover:bg-primary/10">
            <div>
                <p class="text-[10px] font-bold uppercase tracking-[0.18em] text-primary/60">Portal Switch</p>
                <p class="text-sm font-semibold">Employee View</p>
            </div>
            <span class="material-symbols-outlined text-[18px]">badge</span>
        </a>
        <div class="bg-slate-50 border border-slate-100 rounded-2xl p-3 flex items-center gap-3">
            <div class="w-9 h-9 rounded-full overflow-hidden bg-primary/10 flex items-center justify-center text-primary font-bold text-sm shrink-0">
                <img th:if="${data.manager != null && data.manager.avatarUrl != null}"
                     th:src="${data.manager.avatarUrl}"
                     th:alt="${data.manager.name}"
                     class="w-full h-full object-cover"
                     onerror="this.style.display='none'"/>
            </div>
            <div class="flex-1 min-w-0">
                <p class="text-xs font-bold text-slate-800 truncate" th:text="${data.manager != null ? data.manager.name : 'User'}">User</p>
                <p class="text-[11px] font-medium text-slate-400 truncate" th:text="${data.manager != null ? data.manager.role : ''}"></p>
            </div>
            <form th:action="@{/logout}" method="post" class="shrink-0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit"
                        class="w-7 h-7 rounded-lg flex items-center justify-center text-slate-400 hover:text-rose-500 hover:bg-rose-50 transition-colors">
                    <span class="material-symbols-outlined text-sm">logout</span>
                </button>
            </form>
        </div>
    </div>
</aside>

</body>
</html>
