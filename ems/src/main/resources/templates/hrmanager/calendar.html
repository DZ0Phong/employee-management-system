<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title th:text="${pageTitle != null ? pageTitle : 'Calendar - EMS'}">Calendar - EMS</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/css/app-icons.css" th:href="@{/css/app-icons.css}" />
    <script defer src="/js/app-icons.js" th:src="@{/js/app-icons.js}"></script>
    <script defer src="/js/hrmanager-calendar.js" th:src="@{/js/hrmanager-calendar.js}"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#1414b8",
                        "primary-light": "#e8e8fb",
                        "bg-light": "#f6f6f8",
                    },
                    fontFamily: { display: ["Inter"] },
                },
            },
        };
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .fill-icon {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #1414b840;
            border-radius: 99px;
        }

        /* Dot grid background */
        .dot-grid {
            background-image: radial-gradient(circle, #1414b820 1px, transparent 1px);
            background-size: 24px 24px;
        }

        .nav-active {
            box-shadow: 0 0 0 1px #1414b830, inset 3px 0 0 #1414b8;
        }
    </style>
</head>

<body class="bg-bg-light font-display text-slate-900 min-h-screen">
    <div class="flex h-screen overflow-hidden">

        <!-- ══════════════════════════════════════════════════════════ -->
        <!-- SIDEBAR                                                   -->
        <!-- ══════════════════════════════════════════════════════════ -->
        <aside th:replace="~{fragments/hrmanager-sidebar :: sidebar(${activePage}, ${currentUser})}"></aside>

        <!-- ── Main Content ─────────────────────────────────────────────────────── -->
        <main class="flex-1 flex flex-col overflow-hidden">

            <!-- Header -->
            <header
                class="h-16 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-8 shrink-0">
                <div class="flex items-center gap-4">
                    <h2 class="text-xl font-bold">Calendar</h2>
                    <!-- Month/Year navigation -->
                    <div class="flex items-center gap-2">
                        <a th:href="@{/hrmanager/calendar(month=${currentMonth == 1 ? 12 : currentMonth - 1}, year=${currentMonth == 1 ? currentYear - 1 : currentYear})}"
                            class="p-1.5 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors">
                            <span class="material-symbols-outlined text-slate-500">chevron_left</span>
                        </a>
                        <span class="text-sm font-bold min-w-[120px] text-center" id="currentPeriodLabel">
                            <!-- Rendered by JS -->
                        </span>
                        <a th:href="@{/hrmanager/calendar(month=${currentMonth == 12 ? 1 : currentMonth + 1}, year=${currentMonth == 12 ? currentYear + 1 : currentYear})}"
                            class="p-1.5 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors">
                            <span class="material-symbols-outlined text-slate-500">chevron_right</span>
                        </a>
                        <a th:href="@{/hrmanager/calendar}"
                            class="px-3 py-1 text-xs font-bold border border-slate-200 dark:border-slate-700 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors ml-2">
                            Today
                        </a>
                    </div>
                    
                    <!-- Department Filter -->
                    <div class="flex items-center gap-2 ml-4">
                        <span class="material-symbols-outlined text-slate-500 text-[18px]">filter_alt</span>
                        <select id="departmentFilter" 
                                class="px-3 py-1.5 text-xs font-bold border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors focus:outline-none focus:ring-2 focus:ring-primary/30"
                                onchange="filterByDepartment(this.value)">
                            <option value="all">All Departments</option>
                            <option value="company-wide">Company-wide Only</option>
                            <!-- Departments populated by JavaScript -->
                        </select>
                    </div>
                </div>
            </header>

            <!-- Calendar Body -->
            <div class="flex-1 overflow-y-auto p-6 dot-grid">
                <!-- Day headers -->
                <div class="grid grid-cols-7 mb-2">
                    <div class="text-center text-xs font-bold text-slate-500 uppercase tracking-wider py-2">Sun</div>
                    <div class="text-center text-xs font-bold text-slate-500 uppercase tracking-wider py-2">Mon</div>
                    <div class="text-center text-xs font-bold text-slate-500 uppercase tracking-wider py-2">Tue</div>
                    <div class="text-center text-xs font-bold text-slate-500 uppercase tracking-wider py-2">Wed</div>
                    <div class="text-center text-xs font-bold text-slate-500 uppercase tracking-wider py-2">Thu</div>
                    <div class="text-center text-xs font-bold text-slate-500 uppercase tracking-wider py-2">Fri</div>
                    <div class="text-center text-xs font-bold text-slate-500 uppercase tracking-wider py-2">Sat</div>
                </div>
                <!-- Calendar grid — rendered by JS -->
                <div id="monthGrid"
                    class="grid grid-cols-7 gap-px bg-slate-200 dark:bg-slate-700 rounded-xl overflow-hidden border border-slate-200 dark:border-slate-700">
                    <!-- Days injected by buildMonthGrid() -->
                </div>
            </div>
        </main>
    </div>

    <!-- ── Add/Edit Event Modal ─────────────────────────────────────────────── -->
    <div id="eventModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/40 backdrop-blur-sm p-4">
        <div class="bg-white dark:bg-slate-900 rounded-3xl shadow-2xl w-full max-w-md mx-auto max-h-[85vh] flex flex-col">
            <!-- Header - Fixed -->
            <div class="flex justify-between items-center p-5 border-b border-slate-200 dark:border-slate-700 shrink-0">
                <h3 id="modalTitle" class="text-lg font-black">Add Event</h3>
                <button onclick="closeModal()"
                    class="text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>

            <!-- Form Content - Scrollable -->
            <form id="eventForm" method="post" th:action="@{/hrmanager/calendar/create}" class="flex flex-col flex-1 overflow-hidden">
                <input type="hidden" name="_method" value="post" />
                <input type="hidden" id="eventId" name="id" />

                <div class="space-y-3 p-5 overflow-y-auto flex-1">
                    <!-- Title -->
                    <div>
                        <label class="text-[11px] font-bold text-slate-500 uppercase tracking-wider">Title *</label>
                        <input type="text" id="eventTitle" name="title" required
                            class="mt-1 w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30"
                            placeholder="Event title" />
                    </div>

                    <!-- Description -->
                    <div>
                        <label class="text-[11px] font-bold text-slate-500 uppercase tracking-wider">Description</label>
                        <textarea id="eventDescription" name="description" rows="2"
                            class="mt-1 w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 resize-none"
                            placeholder="Optional description"></textarea>
                    </div>

                    <!-- Date Row -->
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-[11px] font-bold text-slate-500 uppercase tracking-wider">Start Date
                                *</label>
                            <input type="date" id="eventStartDate" name="startDate" required
                                class="mt-1 w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-2.5 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30" />
                        </div>
                        <div>
                            <label class="text-[11px] font-bold text-slate-500 uppercase tracking-wider">End Date</label>
                            <input type="date" id="eventEndDate" name="endDate"
                                class="mt-1 w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-2.5 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30" />
                        </div>
                    </div>

                    <!-- All Day Toggle -->
                    <div class="flex items-center gap-2 p-2.5 bg-slate-50 dark:bg-slate-800/50 rounded-xl">
                        <input type="checkbox" id="eventAllDay" name="isAllDay"
                            class="rounded border-slate-300 text-primary focus:ring-primary"
                            onchange="toggleTimeFields(this.checked)" />
                        <label for="eventAllDay" class="text-sm font-medium">All Day Event</label>
                    </div>

                    <!-- Time Row -->
                    <div id="timeFields" class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-[11px] font-bold text-slate-500 uppercase tracking-wider">Start Time</label>
                            <input type="time" id="eventStartTime" name="startTime"
                                class="mt-1 w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-2.5 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30" />
                        </div>
                        <div>
                            <label class="text-[11px] font-bold text-slate-500 uppercase tracking-wider">End Time</label>
                            <input type="time" id="eventEndTime" name="endTime"
                                class="mt-1 w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-2.5 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30" />
                        </div>
                    </div>

                    <!-- Type & Color Row -->
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-[11px] font-bold text-slate-500 uppercase tracking-wider">Type</label>
                            <select id="eventType" name="type"
                                class="mt-1 w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-2.5 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30">
                                <option value="MEETING">Meeting</option>
                                <option value="HOLIDAY">Holiday</option>
                                <option value="REVIEW">Review</option>
                                <option value="TRAINING">Training</option>
                                <option value="OTHER">Other</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[11px] font-bold text-slate-500 uppercase tracking-wider">Color</label>
                            <select id="eventColor" name="color"
                                class="mt-1 w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-2.5 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30">
                                <option value="blue">Blue</option>
                                <option value="purple">Purple</option>
                                <option value="emerald">Emerald</option>
                                <option value="amber">Amber</option>
                                <option value="rose">Rose</option>
                            </select>
                        </div>
                    </div>

                    <!-- Company-wide Toggle -->
                    <div class="flex items-center gap-2 p-2.5 bg-blue-50 dark:bg-blue-900/20 rounded-xl">
                        <input type="checkbox" id="eventCompanyWide" name="isCompanyWide"
                            class="rounded border-slate-300 text-primary focus:ring-primary"
                            onchange="toggleDepartmentFields(this.checked)" />
                        <div class="flex-1">
                            <label for="eventCompanyWide" class="text-sm font-bold text-blue-700 dark:text-blue-400">Company-wide Event</label>
                            <p class="text-[11px] text-blue-600 dark:text-blue-500 mt-0.5">Visible to all departments</p>
                        </div>
                        <span class="material-symbols-outlined text-blue-500 text-[20px]">corporate_fare</span>
                    </div>

                    <!-- Departments Multi-select -->
                    <div id="departmentFields">
                        <label class="text-[11px] font-bold text-slate-500 uppercase tracking-wider">Assign to Departments</label>
                        <div class="mt-1.5 space-y-1.5 max-h-32 overflow-y-auto p-2.5 border border-slate-200 dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-800/50">
                            <!-- Department checkboxes will be populated by JavaScript -->
                            <div id="departmentCheckboxes">
                                <!-- Example structure (will be generated dynamically):
                                <label class="flex items-center gap-2 p-1.5 hover:bg-white dark:hover:bg-slate-700 rounded-lg cursor-pointer">
                                    <input type="checkbox" name="departments" value="1" class="rounded border-slate-300 text-primary focus:ring-primary" />
                                    <span class="text-sm">Engineering</span>
                                </label>
                                -->
                            </div>
                        </div>
                        <input type="hidden" id="assignedDepartments" name="assignedDepartments" />
                        <p class="text-[11px] text-slate-500 mt-1">Select one or more departments for this event</p>
                    </div>
                </div>

                <!-- Footer Buttons - Fixed -->
                <div class="flex gap-2.5 p-5 border-t border-slate-200 dark:border-slate-700 shrink-0">
                    <button type="button" onclick="closeModal()"
                        class="flex-1 py-2 rounded-xl border border-slate-200 dark:border-slate-700 text-slate-600 font-bold text-sm hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                        Cancel
                    </button>
                    <button type="submit" id="submitBtn"
                        class="flex-1 py-2 rounded-xl bg-primary text-white font-bold text-sm hover:bg-primary/90 transition-colors">
                        Save Event
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- ── Delete Confirm Modal ─────────────────────────────────────────────── -->
    <div id="deleteModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/40 backdrop-blur-sm">
        <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-2xl w-full max-w-sm mx-4 p-8">
            <div class="flex flex-col items-center text-center mb-6">
                <div class="size-14 bg-red-100 dark:bg-red-900/30 rounded-full flex items-center justify-center mb-4">
                    <span class="material-symbols-outlined text-red-500 text-2xl">delete</span>
                </div>
                <h3 class="text-lg font-black">Delete Event</h3>
                <p class="text-sm text-slate-500 mt-1">Are you sure you want to delete <span id="deleteEventName"
                        class="font-bold text-slate-700 dark:text-slate-300"></span>?</p>
            </div>
            <form id="deleteForm" method="post" th:action="@{/hrmanager/calendar/delete}">
                <input type="hidden" id="deleteEventId" name="id" />
                <div class="flex gap-3">
                    <button type="button" onclick="closeDeleteModal()"
                        class="flex-1 py-2.5 rounded-lg border border-slate-200 dark:border-slate-700 text-slate-600 font-bold text-sm hover:bg-slate-50 transition-colors">
                        Cancel
                    </button>
                    <button type="submit"
                        class="flex-1 py-2.5 rounded-lg bg-red-500 text-white font-bold text-sm hover:bg-red-600 transition-colors">
                        Delete
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- ── Day Detail Modal (View All Events) ───────────────────────────────── -->
    <div id="dayDetailModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/40 backdrop-blur-sm">
        <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-2xl w-full max-w-lg mx-4 max-h-[80vh] flex flex-col">
            <!-- Header -->
            <div class="p-6 border-b border-slate-200 dark:border-slate-700 flex justify-between items-center shrink-0">
                <div>
                    <h3 id="dayDetailTitle" class="text-xl font-black">Events on April 8, 2026</h3>
                    <p id="dayDetailCount" class="text-xs text-slate-500 mt-1">5 events</p>
                </div>
                <button onclick="closeDayDetailModal()"
                    class="text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>

            <!-- Events List (Scrollable) -->
            <div id="dayDetailEventsList" class="flex-1 overflow-y-auto p-6 space-y-3">
                <!-- Events will be injected here by JavaScript -->
            </div>

            <!-- Footer -->
            <div class="p-6 border-t border-slate-200 dark:border-slate-700 shrink-0">
                <button onclick="addEventFromDayDetail()"
                    class="w-full py-3 rounded-lg bg-primary text-white font-bold text-sm hover:bg-primary/90 transition-colors flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined text-[18px]">add</span>
                    Add Event
                </button>
            </div>
        </div>
    </div>

    <!-- ── Toast ──────────────────────────────────────────────────────────────── -->
    <div id="toast"
        class="fixed bottom-6 right-6 z-50 hidden items-center gap-3 px-5 py-3 rounded-xl shadow-lg text-white text-sm font-semibold">
        <span id="toast-icon" class="material-symbols-outlined text-[20px]">check_circle</span>
        <span id="toast-msg">Done</span>
    </div>

    <script th:inline="javascript">
        /*<![CDATA[*/
        var calendarMonth = /*[[${currentMonth}]]*/ 1;
        var calendarYear = /*[[${currentYear}]]*/ 2026;
        var calendarEvents = /*[[${events}]]*/[];
        var calendarFlashMessage = /*[[${flashMessage}]]*/ null;
        var calendarFlashType = /*[[${flashType}]]*/ 'success';

        var MONTHS = ['January', 'February', 'March', 'April', 'May', 'June',
            'July', 'August', 'September', 'October', 'November', 'December'];

        document.getElementById('currentPeriodLabel').textContent = MONTHS[calendarMonth - 1] + ' ' + calendarYear;

        function buildMonthGrid() {
            var grid = document.getElementById('monthGrid');
            if (!grid) return;

            var today = new Date();
            var firstDay = new Date(calendarYear, calendarMonth - 1, 1).getDay();
            var daysInMonth = new Date(calendarYear, calendarMonth, 0).getDate();
            var daysInPrev = new Date(calendarYear, calendarMonth - 1, 0).getDate();
            var html = '';

            // Ngày tháng trước
            for (var i = firstDay - 1; i >= 0; i--) {
                var d = daysInPrev - i;
                html += '<div class="bg-white dark:bg-slate-900 min-h-[100px] p-2 opacity-40">'
                    + '<span class="text-xs font-bold text-slate-400">' + d + '</span>'
                    + '</div>';
            }

            // Ngày tháng hiện tại
            for (var d = 1; d <= daysInMonth; d++) {
                var isToday = d === today.getDate()
                    && calendarMonth === today.getMonth() + 1
                    && calendarYear === today.getFullYear();
                var mm = String(calendarMonth).padStart(2, '0');
                var dd = String(d).padStart(2, '0');
                var dateStr = calendarYear + '-' + mm + '-' + dd;
                var dayEvts = calendarEvents.filter(function (e) { return e.startDate === dateStr; });
                var ringCls = isToday ? 'ring-2 ring-primary ring-inset' : '';

                var numBadge = isToday
                    ? '<span class="text-xs font-bold bg-primary text-white rounded-full w-6 h-6 flex items-center justify-center">' + d + '</span>'
                    : '<span class="text-xs font-bold text-slate-700 dark:text-slate-300">' + d + '</span>';

                var evtsHtml = '';
                var shown = dayEvts.slice(0, 3);
                for (var j = 0; j < shown.length; j++) {
                    var ev = shown[j];

                    evtsHtml += '<div class="text-[10px] font-bold px-1.5 py-0.5 rounded truncate cursor-pointer ' + getEventBgClass(ev.color) + '"'
                        + ' onclick="event.stopPropagation(); openDayDetailModal(\'' + dateStr + '\')"'
                        + ' title="' + (ev.title || '').replace(/"/g, '&quot;') + ' - Click to view all events">'
                        + (ev.title || '')
                        + '</div>';
                }
                if (dayEvts.length > 3) {
                    evtsHtml += '<div class="text-[10px] text-slate-400 font-medium px-1 cursor-pointer hover:text-primary transition-colors"'
                        + ' onclick="event.stopPropagation(); openDayDetailModal(\'' + dateStr + '\')"'
                        + ' title="Click to view all events">+' + (dayEvts.length - 3) + ' more</div>';
                }

                var dayClickHandler = dayEvts.length > 0
                    ? 'openDayDetailModal(\'' + dateStr + '\')'
                    : 'openAddModalWithDate(\'' + dateStr + '\')';

                html += '<div class="bg-white dark:bg-slate-900 min-h-[100px] p-2 cursor-pointer hover:bg-slate-50 transition-colors ' + ringCls + '"'
                    + ' onclick="' + dayClickHandler + '">'
                    + '<div class="flex justify-between items-start mb-1">' + numBadge + '</div>'
                    + '<div class="space-y-1">' + evtsHtml + '</div>'
                    + '</div>';
            }

            // Ngày tháng sau
            var totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;
            for (var d = 1; d <= totalCells - firstDay - daysInMonth; d++) {
                html += '<div class="bg-white dark:bg-slate-900 min-h-[100px] p-2 opacity-40">'
                    + '<span class="text-xs font-bold text-slate-400">' + d + '</span>'
                    + '</div>';
            }

            grid.innerHTML = html;
            window.hydrateAppIcons?.(grid);
        }

        function getEventBgClass(color) {
            var map = {
                blue: 'bg-blue-100 text-blue-700',
                purple: 'bg-purple-100 text-purple-700',
                emerald: 'bg-emerald-100 text-emerald-700',
                amber: 'bg-amber-100 text-amber-700',
                rose: 'bg-rose-100 text-rose-700'
            };
            return map[color] || map.blue;
        }

        buildMonthGrid();

        function openModal() {
            var m = document.getElementById('eventModal');
            m.classList.remove('hidden'); m.classList.add('flex');
        }
        function closeModal() {
            var m = document.getElementById('eventModal');
            m.classList.add('hidden'); m.classList.remove('flex');
            document.getElementById('eventForm').reset();
            document.getElementById('eventId').value = '';
            document.getElementById('timeFields').style.display = '';
        }
        function openAddModal() {
            document.getElementById('modalTitle').textContent = 'Add Event';
            document.getElementById('eventForm').action = '/hrmanager/calendar/create';
            openModal();
        }
        function openAddModalWithDate(dateStr) {
            openAddModal();
            document.getElementById('eventStartDate').value = dateStr;
            document.getElementById('eventEndDate').value = dateStr;
        }
        function openEditModalFromData(evStr) {
            var ev = evStr;
            if (typeof evStr === 'string') {
                try { ev = JSON.parse(evStr); } catch (e) { return; }
            }
            document.getElementById('modalTitle').textContent = 'Edit Event';
            document.getElementById('eventForm').action = '/hrmanager/calendar/update';
            document.getElementById('eventId').value = ev.id || '';
            document.getElementById('eventTitle').value = ev.title || '';
            document.getElementById('eventDescription').value = ev.description || '';
            document.getElementById('eventStartDate').value = ev.startDate || '';
            document.getElementById('eventEndDate').value = ev.endDate || '';
            document.getElementById('eventStartTime').value = ev.startTime || '';
            document.getElementById('eventEndTime').value = ev.endTime || '';
            document.getElementById('eventType').value = ev.type || 'MEETING';
            document.getElementById('eventColor').value = ev.color || 'blue';
            document.getElementById('eventAllDay').checked = ev.isAllDay || false;
            toggleTimeFields(ev.isAllDay || false);
            openModal();
        }
        function openEditModal(id, title, desc, sd, ed, st, et, type, color, allDay) {
            openEditModalFromData({ id: id, title: title, description: desc, startDate: sd, endDate: ed, startTime: st, endTime: et, type: type, color: color, isAllDay: allDay });
        }
        function toggleTimeFields(allDay) {
            document.getElementById('timeFields').style.display = allDay ? 'none' : '';
        }
        document.getElementById('eventModal').addEventListener('click', function (e) {
            if (e.target === this) closeModal();
        });

        function confirmDelete(id, name) {
            document.getElementById('deleteEventId').value = id;
            document.getElementById('deleteEventName').textContent = name;
            var m = document.getElementById('deleteModal');
            m.classList.remove('hidden'); m.classList.add('flex');
        }
        function closeDeleteModal() {
            var m = document.getElementById('deleteModal');
            m.classList.add('hidden'); m.classList.remove('flex');
        }
        document.getElementById('deleteModal').addEventListener('click', function (e) {
            if (e.target === this) closeDeleteModal();
        });

        function showToast(message, type) {
            var toast = document.getElementById('toast');
            var icon = document.getElementById('toast-icon');
            var msg = document.getElementById('toast-msg');
            msg.textContent = message;
            var iconName = type === 'success' ? 'check_circle' : type === 'error' ? 'error' : 'info';
            if (window.setAppIcon) {
                window.setAppIcon(icon, iconName);
            } else {
                icon.textContent = iconName;
            }
            toast.className = toast.className.replace(/bg-\S+/g, '');
            toast.classList.add(type === 'success' ? 'bg-emerald-600' : type === 'error' ? 'bg-rose-600' : 'bg-slate-700');
            toast.classList.remove('hidden'); toast.classList.add('flex');
            setTimeout(function () { toast.classList.add('hidden'); toast.classList.remove('flex'); }, 3200);
        }

        function openEditFromBtn(btn) {
            openEditModalFromData({
                id: btn.dataset.id,
                title: btn.dataset.title,
                description: btn.dataset.description,
                startDate: btn.dataset.startDate,
                endDate: btn.dataset.endDate,
                startTime: btn.dataset.startTime,
                endTime: btn.dataset.endTime,
                type: btn.dataset.type,
                color: btn.dataset.color,
                isAllDay: btn.dataset.allDay === 'true'
            });
        }

        function confirmDeleteFromBtn(btn) {
            confirmDelete(btn.dataset.id, btn.dataset.title);
        }

        // ── Day Detail Modal Functions ────────────────────────────────────────────
        var currentDayDetailDate = null;

        function openDayDetailModal(dateStr) {
            currentDayDetailDate = dateStr;
            var dayEvents = calendarEvents.filter(function (e) { return e.startDate === dateStr; });

            // Format date for display
            var dateParts = dateStr.split('-');
            var dateObj = new Date(dateParts[0], dateParts[1] - 1, dateParts[2]);
            var monthName = MONTHS[dateObj.getMonth()];
            var dayNum = dateObj.getDate();
            var year = dateObj.getFullYear();

            // Update modal title
            document.getElementById('dayDetailTitle').textContent = 'Events on ' + monthName + ' ' + dayNum + ', ' + year;
            document.getElementById('dayDetailCount').textContent = dayEvents.length + (dayEvents.length === 1 ? ' event' : ' events');

            // Render events list
            renderDayEvents(dayEvents);

            // Show modal
            var modal = document.getElementById('dayDetailModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeDayDetailModal() {
            var modal = document.getElementById('dayDetailModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            currentDayDetailDate = null;
        }

        function renderDayEvents(events) {
            var container = document.getElementById('dayDetailEventsList');

            if (events.length === 0) {
                container.innerHTML = '<div class="text-center py-8 text-slate-400">'
                    + '<span class="material-symbols-outlined text-4xl mb-2">event_busy</span>'
                    + '<p class="text-sm">No events on this day</p>'
                    + '</div>';
                window.hydrateAppIcons?.(container);
                return;
            }

            var html = '';
            events.forEach(function (ev) {
                var colorClass = getEventBgClass(ev.color);
                var timeStr = ev.isAllDay ? 'All Day' : (ev.startTime || '') + (ev.endTime ? ' - ' + ev.endTime : '');
                var typeLabel = ev.type || 'OTHER';

                html += '<div class="bg-slate-50 dark:bg-slate-800 rounded-xl p-4 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">'
                    + '<div class="flex items-start justify-between gap-3">'
                    + '<div class="flex-1">'
                    + '<div class="flex items-center gap-2 mb-1">'
                    + '<div class="w-3 h-3 rounded-full ' + colorClass.split(' ')[0] + '"></div>'
                    + '<h4 class="font-bold text-sm">' + (ev.title || 'Untitled') + '</h4>'
                    + '</div>'
                    + '<p class="text-xs text-slate-500 mb-1">' + timeStr + ' • ' + typeLabel + '</p>';

                if (ev.description) {
                    html += '<p class="text-xs text-slate-600 dark:text-slate-400 mt-2">' + ev.description + '</p>';
                }

                html += '</div>'
                    + '<div class="flex items-center gap-1 shrink-0">'
                    + '<button onclick="editEventFromDayDetail(' + ev.id + ')" '
                    + 'class="p-1.5 hover:bg-slate-200 dark:hover:bg-slate-600 rounded-lg transition-colors" title="Edit">'
                    + '<span class="material-symbols-outlined text-[18px] text-slate-600 dark:text-slate-400">edit</span>'
                    + '</button>'
                    + '<button onclick="deleteEventFromDayDetail(' + ev.id + ', \'' + (ev.title || 'Untitled').replace(/'/g, "\\'") + '\')" '
                    + 'class="p-1.5 hover:bg-rose-100 dark:hover:bg-rose-900/30 rounded-lg transition-colors" title="Delete">'
                    + '<span class="material-symbols-outlined text-[18px] text-rose-500">delete</span>'
                    + '</button>'
                    + '</div>'
                    + '</div>'
                    + '</div>';
            });

            container.innerHTML = html;
            window.hydrateAppIcons?.(container);
        }

        function addEventFromDayDetail() {
            closeDayDetailModal();
            openAddModalWithDate(currentDayDetailDate);
        }

        function editEventFromDayDetail(eventId) {
            var ev = calendarEvents.find(function (e) { return e.id === eventId; });
            if (!ev) return;
            closeDayDetailModal();
            openEditModalFromData(ev);
        }

        function deleteEventFromDayDetail(eventId, eventTitle) {
            closeDayDetailModal();
            confirmDelete(eventId, eventTitle);
        }

        // Close modal on backdrop click
        document.getElementById('dayDetailModal').addEventListener('click', function (e) {
            if (e.target === this) closeDayDetailModal();
        });

        if (calendarFlashMessage) showToast(calendarFlashMessage, calendarFlashType);
        /*]]>*/
    </script>

</body>

</html>
