<!DOCTYPE html>

<html class="light" lang="en" xmlns:th=http://www.thymeleaf.org><head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1414b8",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111121",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased">
<div class="relative flex min-h-screen w-full flex-col items-center justify-center p-4">
    <!-- Main Auth Card Container -->
    <div class="w-full max-w-[440px] flex flex-col gap-6">
        <!-- Branding Header -->
        <div class="flex flex-col items-center text-center gap-2">
            <div class="flex items-center justify-center w-12 h-12 rounded-xl bg-primary mb-2">
                <span class="material-symbols-outlined text-white text-3xl">corporate_fare</span>
            </div>
            <h1 class="text-slate-900 dark:text-slate-100 text-3xl font-bold tracking-tight">EMS Pro</h1>
        </div>
        <!-- Login Card -->
        <div class="bg-white dark:bg-slate-900 rounded-xl shadow-xl border border-primary/10 overflow-hidden">
            <div class="p-8">
                <div class="mb-8">
                    <h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold leading-tight">Welcome Back</h2>
                    <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Enter your credentials to access your account</p>
                </div>
                <!-- Error State (Subtle Banner) -->
                <div class="mb-6 p-3 rounded-lg bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 flex items-center gap-3">
                    <span class="material-symbols-outlined text-red-600 dark:text-red-400 text-sm">error</span>
                    <p class="text-red-600 dark:text-red-400 text-xs font-medium">Invalid credentials. Please try again.</p>
                </div>
                <form class="flex flex-col gap-5" th:action="@{/login}" method="post">
                    <!-- Username Input -->
                    <div class="flex flex-col gap-2">
                        <label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Username</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">person</span>
                            <input
                                    name="username"
                                    class="w-full pl-10 pr-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all"
                                    placeholder="Enter your username"
                                    type="text"
                            />
                        </div>
                    </div>
                    <!-- Password Input -->
                    <div class="flex flex-col gap-2">
                        <div class="flex justify-between items-center">
                            <label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Password</label>
                            <a class="text-primary text-xs font-semibold hover:underline" href="#">Forgot password?</a>
                        </div>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">lock</span>
                            <input name="password" class="w-full pl-10 pr-12 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" placeholder="••••••••" type="password"/>
                            <button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200" type="button">
                                <span class="material-symbols-outlined text-xl">visibility</span>
                            </button>
                        </div>
                    </div>
                    <!-- Remember Me -->
                    <div class="flex items-center gap-2">
                        <input name="remember-me" class="w-4 h-4 rounded border-slate-300 dark:border-slate-700 text-primary focus:ring-primary transition-all cursor-pointer" id="remember" type="checkbox"/>
                        <label class="text-slate-600 dark:text-slate-400 text-sm cursor-pointer select-none" for="remember">Remember me for 30 days</label>
                    </div>
                    <!-- Login Button -->
                    <button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3.5 rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 mt-2" type="submit">
                        Log In
                        <span class="material-symbols-outlined text-xl">login</span>
                    </button>
                </form>
            </div>
            <!-- Card Footer -->
            <div class="bg-slate-50 dark:bg-slate-800/50 border-t border-slate-100 dark:border-slate-800 p-4 text-center">
                <p class="text-slate-500 dark:text-slate-400 text-xs">
                    Don't have an account? <a class="text-primary font-bold hover:underline" href="#">Contact Admin</a>
                </p>
            </div>
        </div>
        <!-- Additional Links -->
        <div class="flex justify-center gap-6 text-slate-400 dark:text-slate-500 text-xs font-medium">
            <a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
            <a class="hover:text-primary transition-colors" href="#">Terms of Service</a>
            <a class="hover:text-primary transition-colors" href="#">Help Center</a>
        </div>
    </div>
</div>
</body></html>
