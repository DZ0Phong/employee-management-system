<!DOCTYPE html>
<html class="light" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/css/app-icons.css" th:href="@{/css/app-icons.css}"/>
    <script defer src="/js/app-icons.js" th:src="@{/js/app-icons.js}"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1414b8",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111121",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        };
    </script>
    <style>
        .auth-field-icon {
            width: 1.25rem;
            height: 1.25rem;
        }

        .password-toggle {
            width: 2rem;
            height: 2rem;
            border-radius: 9999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        input[type="password"]::-ms-reveal,
        input[type="password"]::-ms-clear {
            display: none;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased">
<div class="relative flex min-h-screen w-full flex-col items-center justify-center p-4">
    <div class="w-full max-w-[440px] flex flex-col gap-6">
        <div class="flex flex-col items-center text-center gap-2">
            <div class="flex items-center justify-center w-12 h-12 rounded-xl bg-primary mb-2">
                <span class="material-symbols-outlined text-white text-3xl">corporate_fare</span>
            </div>
            <h1 class="text-slate-900 dark:text-slate-100 text-3xl font-bold tracking-tight">EMS Pro</h1>
        </div>

        <div class="bg-white dark:bg-slate-900 rounded-xl shadow-xl border border-primary/10 overflow-hidden">
            <div class="p-8">
                <div class="mb-8">
                    <h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold leading-tight">Welcome Back</h2>
                    <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Enter your credentials to access your account</p>
                </div>

                <div th:if="${param.error}" class="mb-6 p-3 rounded-lg bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 flex items-center gap-3">
                    <span class="material-symbols-outlined text-red-600 dark:text-red-400 text-sm">error</span>
                    <p class="text-red-600 dark:text-red-400 text-xs font-medium">
                        Invalid username or password. Please try again.
                    </p>
                </div>

                <form class="flex flex-col gap-5" th:action="@{/login}" method="post">
                    <div class="flex flex-col gap-2">
                        <label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Username</label>
                        <div class="relative">
                            <span class="material-symbols-outlined auth-field-icon absolute left-2 top-1/2 -translate-y-1/2 text-slate-400">person</span>
                            <input
                                name="username"
                                class="w-full pl-12 pr-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all"
                                placeholder="Enter your username"
                                type="text"
                            />
                        </div>
                    </div>

                    <div class="flex flex-col gap-2">
                        <label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Password</label>
                        <div class="relative">
                            <span class="material-symbols-outlined auth-field-icon absolute left-2 top-1/2 -translate-y-1/2 text-slate-400">lock</span>
                            <input
                                id="password-input"
                                name="password"
                                class="w-full pl-12 pr-12 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all"
                                placeholder="••••••••"
                                type="password"
                            />
                            <button
                                id="password-toggle"
                                class="password-toggle absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-700/50 transition-colors"
                                type="button"
                                aria-label="Show password"
                                aria-pressed="false">
                                <span id="password-toggle-icon" class="material-symbols-outlined auth-field-icon">visibility</span>
                            </button>
                        </div>
                    </div>

                    <div class="flex items-center gap-2">
                        <input name="remember-me" class="w-4 h-4 rounded border-slate-300 dark:border-slate-700 text-primary focus:ring-primary transition-all cursor-pointer" id="remember" type="checkbox"/>
                        <label class="text-slate-600 dark:text-slate-400 text-sm cursor-pointer select-none" for="remember">Remember me for 30 days</label>
                        <a class="ml-auto text-primary text-xs font-semibold hover:underline" href="#">Forgot password?</a>
                    </div>

                    <button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3.5 rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 mt-2" type="submit">
                        Log In
                        <span class="material-symbols-outlined text-xl">login</span>
                    </button>
                </form>
            </div>

            <div class="bg-slate-50 dark:bg-slate-800/50 border-t border-slate-100 dark:border-slate-800 p-4 text-center">
                <p class="text-slate-500 dark:text-slate-400 text-xs">
                    Don't have an account? <a class="text-primary font-bold hover:underline" href="#">Contact Admin</a>
                </p>
            </div>
        </div>

        <div class="flex justify-center gap-6 text-slate-400 dark:text-slate-500 text-xs font-medium">
            <a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
            <a class="hover:text-primary transition-colors" href="#">Terms of Service</a>
            <a class="hover:text-primary transition-colors" href="#">Help Center</a>
        </div>
    </div>
</div>
<script>
    (function () {
        var passwordInput = document.getElementById('password-input');
        var toggleButton = document.getElementById('password-toggle');
        var toggleIcon = document.getElementById('password-toggle-icon');

        if (!passwordInput || !toggleButton || !toggleIcon) {
            return;
        }

        toggleButton.addEventListener('click', function () {
            var showPassword = passwordInput.type === 'password';
            passwordInput.type = showPassword ? 'text' : 'password';
            toggleButton.setAttribute('aria-label', showPassword ? 'Hide password' : 'Show password');
            toggleButton.setAttribute('aria-pressed', showPassword ? 'true' : 'false');

            if (window.setAppIcon) {
                window.setAppIcon(toggleIcon, showPassword ? 'visibility_off' : 'visibility');
            } else {
                toggleIcon.textContent = showPassword ? 'visibility_off' : 'visibility';
            }
        });
    })();
</script>
</body>
</html>
