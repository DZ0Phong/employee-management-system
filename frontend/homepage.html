<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMS</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    main {
      flex: 1;
    }

    .hero {
      background: linear-gradient(135deg, #667eea 0%, #099942 100%);
      color: white;
      text-align: center;
      padding: 100px 20px;
    }

    footer {
      background-color: #343a40;
      color: white;
      padding: 20px 0;
      text-align: center;
    }

    #scrollTopBtn {
      position: fixed;
      bottom: 40px;
      right: 40px;
      display: none;
      z-index: 99;
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#"><i class="bi bi-building"></i> EMS</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="#">About</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
          <li class="nav-item"><a class="btn btn-primary ms-3" href="#">Login/Signup</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <main>
    <section class="hero">
      <h1>Employee manage with trust and professional</h1>
      <p></p>
      <a href="#" class="btn btn-light btn-lg">Get Started</a>
    </section>
  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 EMS | Follow us on
      <a href="#" class="text-white"><i class="bi bi-facebook"></i> Facebook</a>,
      <a href="#" class="text-white"><i class="bi bi-twitter"></i> Twitter</a>,
      <a href="#" class="text-white"><i class="bi bi-instagram"></i> Instagram</a>
    </p>
  </footer>

  <!-- Scroll-to-Top Button -->
  <button id="scrollTopBtn" class="btn btn-primary">
    ↑
  </button>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Show button when scrolling down
    const scrollTopBtn = document.getElementById("scrollTopBtn");
    window.onscroll = function () {
      if (document.body.scrollTop > 100 || document.documentElement.scrollTop > 100) {
        scrollTopBtn.style.display = "block";
      } else {
        scrollTopBtn.style.display = "none";
      }
    };

    // Scroll to top smoothly
    scrollTopBtn.onclick = function () {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };
  </script>
</body>

</html>
